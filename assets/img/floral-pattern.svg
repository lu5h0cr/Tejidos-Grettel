<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.4" />
    </filter>
    <g id="flower">
      <circle cx="0" cy="0" r="11" fill="#f4c5d9" opacity=".92"/>
      <ellipse cx="0" cy="-30" rx="18" ry="32" fill="#ffd7e7" opacity=".86"/>
      <ellipse cx="0" cy="30" rx="18" ry="32" fill="#ffd7e7" opacity=".86"/>
      <ellipse cx="-30" cy="0" rx="32" ry="18" fill="#f8b7d3" opacity=".76"/>
      <ellipse cx="30" cy="0" rx="32" ry="18" fill="#f8b7d3" opacity=".76"/>
      <ellipse cx="-22" cy="-22" rx="15" ry="28" transform="rotate(-45 -22 -22)" fill="#fff0f7" opacity=".72"/>
      <ellipse cx="22" cy="22" rx="15" ry="28" transform="rotate(-45 22 22)" fill="#fff0f7" opacity=".72"/>
    </g>
    <g id="leaf">
      <path d="M0 0 C28 -18 52 -10 66 8 C37 18 15 15 0 0Z" fill="#b884c7" opacity=".35"/>
      <path d="M2 1 C24 -4 43 0 62 8" stroke="#8f5ca6" stroke-width="2" opacity=".25" fill="none"/>
    </g>
  </defs>
  <rect width="900" height="700" fill="none"/>
