    <use href="#flower" x="120" y="130" transform="scale(1.05) rotate(12 120 130)" opacity=".55"/>
    <use href="#leaf" x="178" y="142" transform="rotate(20 178 142)"/>
    <use href="#leaf" x="70" y="180" transform="rotate(205 70 180)"/>

    <use href="#flower" x="760" y="120" transform="scale(.82) rotate(-15 760 120)" opacity=".46"/>
    <use href="#leaf" x="810" y="142" transform="rotate(35 810 142)"/>
    <use href="#leaf" x="705" y="88" transform="rotate(210 705 88)"/>

    <use href="#flower" x="710" y="545" transform="scale(1.15) rotate(25 710 545)" opacity=".45"/>
    <use href="#leaf" x="785" y="560" transform="rotate(15 785 560)"/>
    <use href="#leaf" x="640" y="525" transform="rotate(210 640 525)"/>

    <use href="#flower" x="165" y="555" transform="scale(.78) rotate(-8 165 555)" opacity=".40"/>
    <use href="#leaf" x="210" y="568" transform="rotate(30 210 568)"/>
    <use href="#leaf" x="100" y="536" transform="rotate(220 100 536)"/>

    <path d="M35 350 C150 290 190 420 300 360 S485 255 620 330 S780 425 868 352" fill="none" stroke="#ffffff" stroke-width="3" opacity=".18"/>
    <path d="M22 385 C120 333 200 445 315 388 S490 310 620 365 S782 454 880 398" fill="none" stroke="#b884c7" stroke-width="2" opacity=".18"/>
